<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Interview AI">
<meta name="theme-color" content="#00d9a3">
<title>Interview Assistant – Shreyas HM</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #0d1117;
  --surface: #161b22;
  --border: #21262d;
  --accent: #00d9a3;
  --text: #e6edf3;
  --muted: #8b949e;
  --user-bg: #1a2332;
  --ai-bg: #0f1f1a;
  --red: #ff4d4d;
}

html, body {
  height: 100%; height: 100dvh;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  overflow: hidden;
}

#app {
  display: flex;
  flex-direction: column;
  height: 100%; height: 100dvh;
}

/* HEADER */
header {
  padding: 12px 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
  padding-top: max(12px, env(safe-area-inset-top));
}

.dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 8px var(--accent);
  animation: pulse 2s infinite;
  flex-shrink: 0;
}

header h1 { font-size: 13px; font-weight: 700; color: var(--accent); letter-spacing: 0.3px; }
header small { font-size: 11px; color: var(--muted); margin-left: auto; }

/* TAGS */
.tags {
  display: flex;
  gap: 6px;
  padding: 8px 12px;
  overflow-x: auto;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.tags::-webkit-scrollbar { display: none; }

.tag {
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 500;
  background: #1c2a23;
  border: 1px solid #2a3f32;
  color: var(--accent);
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
  transition: all 0.15s;
  -webkit-user-select: none;
}
.tag:active { background: var(--accent); color: var(--bg); transform: scale(0.96); }

/* CHAT */
#chat {
  flex: 1;
  overflow-y: auto;
  padding: 14px 12px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  -webkit-overflow-scrolling: touch;
}

.msg {
  max-width: 90%;
  padding: 10px 13px;
  border-radius: 14px;
  font-size: 14px;
  line-height: 1.6;
  animation: pop 0.18s ease;
  word-break: break-word;
}

.msg.user {
  align-self: flex-end;
  background: var(--user-bg);
  border: 1px solid #2a3d5a;
  border-bottom-right-radius: 4px;
  color: #cdd9e5;
}

.msg.ai {
  align-self: flex-start;
  background: var(--ai-bg);
  border: 1px solid #1e3d30;
  border-bottom-left-radius: 4px;
}

.msg.ai .lbl {
  font-size: 10px;
  color: var(--accent);
  margin-bottom: 5px;
  letter-spacing: 0.5px;
  font-weight: 600;
}

.msg.ai strong { color: var(--accent); }

.typing {
  align-self: flex-start;
  padding: 12px 14px;
  background: var(--ai-bg);
  border: 1px solid #1e3d30;
  border-radius: 14px;
  border-bottom-left-radius: 4px;
  display: flex;
  gap: 5px;
  align-items: center;
}
.typing span {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--accent);
  display: inline-block;
  animation: bounce 1.2s infinite;
}
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }

/* INPUT BAR */
.input-bar {
  padding: 10px 12px;
  padding-bottom: max(10px, env(safe-area-inset-bottom));
  background: var(--surface);
  border-top: 1px solid var(--border);
  display: flex;
  gap: 8px;
  align-items: flex-end;
  flex-shrink: 0;
}

textarea {
  flex: 1;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 12px;
  color: var(--text);
  font-family: inherit;
  font-size: 15px;
  padding: 10px 13px;
  resize: none;
  outline: none;
  min-height: 44px;
  max-height: 110px;
  line-height: 1.45;
  transition: border-color 0.15s;
  -webkit-appearance: none;
}
textarea:focus { border-color: var(--accent); }
textarea.listening { border-color: var(--red); }
textarea::placeholder { color: var(--muted); }

.btn {
  width: 44px; height: 44px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: all 0.15s;
  -webkit-user-select: none;
}
.btn:active { transform: scale(0.92); }

#micBtn {
  background: var(--surface);
  border: 1px solid var(--border);
}
#micBtn.listening {
  background: #1a0a0a;
  border-color: var(--red);
  box-shadow: 0 0 10px rgba(255,77,77,0.35);
  animation: micPulse 1s infinite;
}

#sendBtn {
  background: var(--accent);
}
#sendBtn:disabled { opacity: 0.35; }

/* MIC HINT */
#micHint {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);
  background: #1a0a0a;
  border: 1px solid var(--red);
  color: var(--red);
  font-size: 12px;
  padding: 7px 16px;
  border-radius: 20px;
  display: none;
  z-index: 99;
  white-space: nowrap;
  letter-spacing: 0.3px;
}
#micHint.show { display: block; }

@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.45} }
@keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }
@keyframes pop { from{opacity:0;transform:scale(0.96)} to{opacity:1;transform:scale(1)} }
@keyframes micPulse { 0%,100%{box-shadow:0 0 0 0 rgba(255,77,77,0.4)} 50%{box-shadow:0 0 0 7px rgba(255,77,77,0)} }

/* Scrollbar */
#chat::-webkit-scrollbar { width: 3px; }
#chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>
<div id="app">

  <header>
    <div class="dot"></div>
    <h1>INTERVIEW ASSISTANT</h1>
    <small>Shreyas HM · IoT</small>
  </header>

  <div class="tags" id="tags"></div>

  <div id="chat">
    <div class="msg ai">
      <div class="lbl">▸ READY</div>
      Tap a question or use 🎙 mic. Short answers to impress the interviewer! 🚀
    </div>
  </div>

  <div id="micHint">🎙 Listening...</div>

  <div class="input-bar">
    <textarea id="input" placeholder="Type or use mic..." rows="1"
      oninput="resize(this)" onkeydown="onKey(event)"></textarea>
    <button class="btn" id="micBtn" onclick="toggleMic()">
      <svg id="micIcon" width="18" height="18" viewBox="0 0 24 24" fill="#8b949e">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3zm-1 3a1 1 0 0 1 2 0v8a1 1 0 0 1-2 0V4zm6 8a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.93V21h-2v2h6v-2h-2v-2.07A7 7 0 0 0 19 12h-2z"/>
      </svg>
    </button>
    <button class="btn" id="sendBtn" onclick="send()" disabled>
      <svg width="17" height="17" viewBox="0 0 24 24" fill="#0d1117">
        <path d="M2 21l21-9L2 3v7l15 2-15 2z"/>
      </svg>
    </button>
  </div>

</div>

<script>
const TAGS = [
  "Tell me about yourself",
  "FreeRTOS tasks vs threads",
  "MQTT vs HTTP",
  "I2C vs SPI vs UART",
  "Explain IoT Gateway project",
  "What is interrupt handling?",
  "Strengths & weaknesses",
  "Why this embedded role?",
  "What is a semaphore?",
  "Explain REST API project",
  "What is WebSocket?",
  "Memory types in MCU",
];

const SYSTEM = `You help Shreyas H M (IoT Embedded Engineer) answer interview questions. Speak as Shreyas in first person.
Resume: ECE undergrad VTU 2027, CGPA 6.5. Skills: C/C++/Python, FreeRTOS (tasks,semaphores,queues,timers), I2C/SPI/UART, MQTT, TCP/IP, HTTP/HTTPS, WebSocket, REST API, ESP8266/ESP32/Arduino/RPi. Projects: (1) FreeRTOS IoT Gateway-ESP32: DHT22(I2C)+MPU6050(SPI)+GPS(UART), MQTT broker+WebSocket dashboard, GCC+GDB (2) REST API web server on ESP32: GET/POST/PUT, HTTPS self-signed certs, FreeRTOS concurrent tasks (3) SPI LED matrix PCB: 74HC595 shift register, bit-banging in C, EasyEDA PCB design.
STRICT RULES: 2-3 short sentences MAX. No filler. Lead with the key point. Bold one term. First person only.`;

// Build tags
const tagContainer = document.getElementById('tags');
TAGS.forEach(t => {
  const el = document.createElement('div');
  el.className = 'tag';
  el.textContent = t;
  el.onclick = () => send(t);
  tagContainer.appendChild(el);
});

let busy = false;
let recog = null;
let isListening = false;

function resize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 110) + 'px';
  document.getElementById('sendBtn').disabled = !el.value.trim();
}

function onKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
}

function addMsg(text, role) {
  const chat = document.getElementById('chat');
  const d = document.createElement('div');
  d.className = 'msg ' + role;
  if (role === 'ai') {
    d.innerHTML = '<div class="lbl">▸ ANSWER</div>' + fmt(text);
  } else {
    d.textContent = text;
  }
  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
}

function fmt(t) {
  return t
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n/g, '<br>');
}

function showTyping() {
  const chat = document.getElementById('chat');
  const d = document.createElement('div');
  d.className = 'typing'; d.id = 'typing';
  d.innerHTML = '<span></span><span></span><span></span>';
  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

async function send(q) {
  const inp = document.getElementById('input');
  const question = (q || inp.value).trim();
  if (!question || busy) return;

  inp.value = ''; inp.style.height = 'auto';
  document.getElementById('sendBtn').disabled = true;
  busy = true;

  addMsg(question, 'user');
  showTyping();

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 300,
        system: SYSTEM,
        messages: [{ role: 'user', content: question }]
      })
    });
    const data = await res.json();
    const reply = data.content?.map(b => b.text || '').join('') || 'Try again.';
    removeTyping();
    addMsg(reply, 'ai');
  } catch {
    removeTyping();
    addMsg('Network error. Check connection.', 'ai');
  }
  busy = false;
}

function toggleMic() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    addMsg('Speech not supported. Use Chrome on Android.', 'ai');
    return;
  }
  if (isListening) { recog?.stop(); return; }

  recog = new SR();
  recog.lang = 'en-IN';
  recog.interimResults = true;
  recog.continuous = false;
  recog.maxAlternatives = 1;

  recog.onstart = () => {
    isListening = true;
    document.getElementById('micBtn').classList.add('listening');
    document.getElementById('micIcon').setAttribute('fill', '#ff4d4d');
    document.getElementById('micHint').classList.add('show');
    document.getElementById('input').classList.add('listening');
    document.getElementById('input').placeholder = '🎙 Speak now...';
  };

  recog.onresult = (e) => {
    let txt = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      txt += e.results[i][0].transcript;
    }
    document.getElementById('input').value = txt;
    resize(document.getElementById('input'));
  };

  recog.onend = () => {
    isListening = false;
    document.getElementById('micBtn').classList.remove('listening');
    document.getElementById('micIcon').setAttribute('fill', '#8b949e');
    document.getElementById('micHint').classList.remove('show');
    document.getElementById('input').classList.remove('listening');
    document.getElementById('input').placeholder = 'Type or use mic...';
    const val = document.getElementById('input').value.trim();
    if (val) send(val);
  };

  recog.onerror = (e) => {
    isListening = false;
    document.getElementById('micBtn').classList.remove('listening');
    document.getElementById('micIcon').setAttribute('fill', '#8b949e');
    document.getElementById('micHint').classList.remove('show');
    document.getElementById('input').classList.remove('listening');
    document.getElementById('input').placeholder = 'Type or use mic...';

    if (e.error === 'not-allowed') {
      addMsg('🎙 Mic blocked! Go to Android Settings → Apps → Chrome → Permissions → Microphone → Allow. Then reload.', 'ai');
    } else if (e.error === 'network') {
      addMsg('Mic needs internet connection. Check your Wi-Fi/data.', 'ai');
    } else if (e.error !== 'no-speech') {
      addMsg('Mic error: ' + e.error + '. Try typing instead.', 'ai');
    }
  };

  recog.start();
}

// Register service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
</script>
</body>
</html>
